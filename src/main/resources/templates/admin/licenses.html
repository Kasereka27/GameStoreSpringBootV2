<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Licences — Admin GameStore', 'Gestion du stock de clés — Administration GameStore.')}"></head>
<body class="bg-bg-dark text-text antialiased min-h-screen">
  <div class="flex min-h-screen">
    <aside th:replace="~{admin/_sidebar :: sidebar(activePage='licenses')}"></aside>
    <div class="admin-content ml-64 flex min-h-screen flex-1 flex-col">
      <header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-border bg-bg-dark/90 px-6 backdrop-blur-md">
        <nav aria-label="Fil d'Ariane" class="flex items-center gap-2 text-sm">
          <a th:href="@{/admin/dashboard}" class="text-muted hover:text-white">Admin</a>
          <svg class="h-4 w-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          <span class="font-medium text-white">Licences</span>
        </nav>
      </header>
      <main class="flex-1 p-6">
        <div th:replace="~{admin/_alerts :: alerts}"></div>
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-white">Stock de clés</h1>
          <p class="mt-1 text-sm text-muted">Vue par jeu et import CSV / texte</p>
        </div>

        <section class="mb-8 rounded-xl border border-border bg-bg-card p-6">
          <h2 class="text-lg font-semibold text-white mb-4">Importer des clés</h2>
          <form th:action="@{/admin/licenses/import}" th:object="${importForm}" method="post" enctype="multipart/form-data" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
              <div>
                <label for="gameId" class="block text-xs font-medium text-muted mb-1">Jeu</label>
                <select id="gameId" th:field="*{gameId}" required class="w-full rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
                  <option value="">— Sélectionner —</option>
                  <option th:each="game : ${games}" th:value="${game.id}" th:text="${game.title}">Jeu</option>
                </select>
              </div>
              <div>
                <label for="csvFile" class="block text-xs font-medium text-muted mb-1">Fichier CSV (optionnel)</label>
                <input type="file" id="csvFile" name="csvFile" accept=".csv,.txt" class="w-full text-sm text-muted file:mr-3 file:rounded file:border-0 file:bg-brand-purple file:px-3 file:py-2 file:text-white">
                <p class="mt-1 text-xs text-muted">Une clé par ligne, ou format <code>jeu,clé</code></p>
              </div>
            </div>
            <div>
              <label for="keysText" class="block text-xs font-medium text-muted mb-1">Clés (texte)</label>
              <textarea id="keysText" th:field="*{keysText}" rows="6" placeholder="XXXXX-XXXXX-XXXXX&#10;YYYYY-YYYYY-YYYYY"
                        class="w-full rounded-lg border border-border bg-bg-dark px-4 py-3 font-mono text-sm text-white placeholder-muted focus:border-brand-purple focus:outline-none"></textarea>
            </div>
            <button type="submit" class="rounded-lg bg-brand-purple px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-purple-light">Importer</button>
          </form>
        </section>

        <div class="overflow-hidden rounded-xl border border-border bg-bg-card">
          <div class="overflow-x-auto">
            <table class="w-full min-w-[700px] text-left text-sm">
              <thead class="border-b border-border bg-bg-dark/50">
                <tr>
                  <th class="px-6 py-3 font-medium text-muted">Jeu</th>
                  <th class="px-6 py-3 font-medium text-muted">Disponibles</th>
                  <th class="px-6 py-3 font-medium text-muted">Vendues</th>
                  <th class="px-6 py-3 font-medium text-muted">Total</th>
                  <th class="px-6 py-3 font-medium text-muted">Alerte</th>
                  <th class="px-6 py-3 font-medium text-muted">Actions</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-border">
                <tr th:each="stock : ${stockSummary}" class="hover:bg-bg-card-hover/50">
                  <td class="px-6 py-4">
                    <p class="font-medium text-white" th:text="${stock.gameTitle}">Jeu</p>
                    <p class="text-xs text-muted" th:text="${stock.gameSlug}">slug</p>
                  </td>
                  <td class="px-6 py-4 font-semibold" th:classappend="${stock.lowStock} ? ' text-error' : ' text-success'"
                      th:text="${stock.availableCount}">0</td>
                  <td class="px-6 py-4 text-muted" th:text="${stock.soldCount}">0</td>
                  <td class="px-6 py-4 text-white" th:text="${stock.totalCount}">0</td>
                  <td class="px-6 py-4">
                    <span th:if="${stock.lowStock}" class="rounded-full bg-error/20 px-2 py-1 text-xs font-medium text-error">Stock faible</span>
                    <span th:unless="${stock.lowStock}" class="text-xs text-muted">OK</span>
                  </td>
                  <td class="px-6 py-4">
                    <a th:href="@{/admin/licenses/game/{id}(id=${stock.gameId})}" class="text-brand-cyan-light text-xs">Voir les clés</a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div th:replace="~{_layout :: toasts}"></div>
  <div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
