<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Promotions — Admin GameStore', 'Codes promo — Administration GameStore.')}"></head>
<body class="bg-bg-dark text-text antialiased min-h-screen">
  <div class="flex min-h-screen">
    <aside th:replace="~{admin/_sidebar :: sidebar(activePage='promos')}"></aside>
    <div class="admin-content ml-64 flex min-h-screen flex-1 flex-col">
      <header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-border bg-bg-dark/90 px-6 backdrop-blur-md">
        <nav aria-label="Fil d'Ariane" class="flex items-center gap-2 text-sm">
          <a th:href="@{/admin/dashboard}" class="text-muted hover:text-white">Admin</a>
          <svg class="h-4 w-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          <span class="font-medium text-white">Promotions</span>
        </nav>
      </header>
      <main class="flex-1 p-6">
        <div th:replace="~{admin/_alerts :: alerts}"></div>
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-white">Codes promo</h1>
          <p class="mt-1 text-sm text-muted">Création et activation des promotions</p>
        </div>

        <section class="mb-8 rounded-xl border border-border bg-bg-card p-6">
          <h2 class="text-lg font-semibold text-white mb-4">Nouveau code</h2>
          <form th:action="@{/admin/promos}" th:object="${promoForm}" method="post" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
              <label class="block text-xs font-medium text-muted mb-1">Code</label>
              <input type="text" th:field="*{code}" required maxlength="50" placeholder="GAME20"
                     class="w-full rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm uppercase text-white">
            </div>
            <div>
              <label class="block text-xs font-medium text-muted mb-1">Type</label>
              <select th:field="*{discountType}" class="w-full rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
                <option th:each="t : ${discountTypes}" th:value="${t}" th:text="${t}"></option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-muted mb-1">Valeur</label>
              <input type="number" th:field="*{discountValue}" step="0.01" min="0.01" required
                     class="w-full rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
            </div>
            <div>
              <label class="block text-xs font-medium text-muted mb-1">Montant min. (€)</label>
              <input type="number" th:field="*{minOrderAmount}" step="0.01" min="0"
                     class="w-full rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
            </div>
            <div>
              <label class="block text-xs font-medium text-muted mb-1">Utilisations max.</label>
              <input type="number" th:field="*{maxUsages}" min="1"
                     class="w-full rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
            </div>
            <div class="flex items-end">
              <label class="flex items-center gap-2 text-sm text-white">
                <input type="checkbox" th:field="*{active}" class="rounded border-border">
                Actif
              </label>
            </div>
            <div class="md:col-span-2 lg:col-span-3">
              <button type="submit" class="rounded-lg bg-brand-purple px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-purple-light">Créer</button>
            </div>
          </form>
        </section>

        <div class="overflow-hidden rounded-xl border border-border bg-bg-card">
          <table class="w-full text-left text-sm">
            <thead class="border-b border-border bg-bg-dark/50">
              <tr>
                <th class="px-6 py-3 font-medium text-muted">Code</th>
                <th class="px-6 py-3 font-medium text-muted">Réduction</th>
                <th class="px-6 py-3 font-medium text-muted">Utilisations</th>
                <th class="px-6 py-3 font-medium text-muted">Statut</th>
                <th class="px-6 py-3 font-medium text-muted">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-border">
              <tr th:each="promo : ${promos}" class="hover:bg-bg-card-hover/50">
                <td class="px-6 py-4 font-mono font-medium text-brand-cyan-light" th:text="${promo.code}">CODE</td>
                <td class="px-6 py-4 text-white">
                  <span th:if="${promo.discountType.name() == 'PERCENTAGE'}" th:text="${promo.discountValue} + ' %'">10 %</span>
                  <span th:unless="${promo.discountType.name() == 'PERCENTAGE'}" th:text="${promo.discountValue} + ' €'">5 €</span>
                </td>
                <td class="px-6 py-4 text-muted">
                  <span th:text="${promo.usageCount}">0</span>
                  <span th:if="${promo.maxUsages != null}" th:text="' / ' + ${promo.maxUsages}"></span>
                </td>
                <td class="px-6 py-4">
                  <span th:if="${promo.active}" class="rounded-full bg-success/20 px-2 py-1 text-xs text-success">Actif</span>
                  <span th:unless="${promo.active}" class="rounded-full bg-muted/20 px-2 py-1 text-xs text-muted">Inactif</span>
                </td>
                <td class="px-6 py-4">
                  <a th:href="@{/admin/promos/{id}/edit(id=${promo.id})}" class="text-brand-cyan-light text-xs mr-2">Modifier</a>
                  <form th:action="@{/admin/promos/{id}/toggle(id=${promo.id})}" method="post" class="inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="active" th:value="${!promo.active}">
                    <button type="submit" class="text-xs text-brand-cyan-light hover:underline"
                            th:text="${promo.active} ? 'Désactiver' : 'Activer'">Toggle</button>
                  </form>
                  <form th:action="@{/admin/promos/{id}/delete(id=${promo.id})}" method="post" class="inline ml-2">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="text-error text-xs" onclick="return confirm('Supprimer ce code ?')">Supprimer</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>
  <div th:replace="~{_layout :: toasts}"></div>
  <div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
