<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Utilisateur — Admin', 'Détail utilisateur.')}"></head>
<body class="bg-bg-dark text-text antialiased min-h-screen">
<div class="flex min-h-screen">
  <aside th:replace="~{admin/_sidebar :: sidebar(activePage='users')}"></aside>
  <div class="admin-content ml-64 flex min-h-screen flex-1 flex-col">
    <header class="sticky top-0 z-30 flex h-16 items-center border-b border-border bg-bg-dark/90 px-6">
      <a th:href="@{/admin/users}" class="text-muted hover:text-white text-sm">← Utilisateurs</a>
    </header>
    <main class="flex-1 p-6 max-w-xl">
      <div th:replace="~{admin/_alerts :: alerts}"></div>
      <h1 class="text-2xl font-bold text-white" th:text="${managedUser.firstName + ' ' + managedUser.lastName}">User</h1>
      <p class="text-muted text-sm mb-6" th:text="${managedUser.email}">email</p>
      <form th:action="@{/admin/users/{id}(id=${managedUser.id})}" th:object="${userAdminForm}" method="post" class="space-y-4 rounded-xl border border-border bg-bg-card p-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div>
          <label class="block text-xs text-muted mb-1">Rôle</label>
          <select th:field="*{role}" class="w-full rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
            <option th:each="r : ${userRoles}" th:value="${r}" th:text="${r}"></option>
          </select>
        </div>
        <label class="flex items-center gap-2 text-sm text-white">
          <input type="checkbox" th:field="*{enabled}"> Compte actif
        </label>
        <label class="flex items-center gap-2 text-sm text-white">
          <input type="checkbox" th:field="*{emailVerified}"> Email vérifié
        </label>
        <button type="submit" class="rounded-lg bg-brand-purple px-4 py-2 text-sm font-semibold text-white">Enregistrer</button>
      </form>
    </main>
  </div>
</div>
<div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
