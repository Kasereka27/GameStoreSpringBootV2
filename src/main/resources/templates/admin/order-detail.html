<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Détail commande — Admin', 'Détail commande — Administration GameStore.')}"></head>
<body class="bg-bg-dark text-text antialiased min-h-screen">
  <div class="flex min-h-screen">
    <aside th:replace="~{admin/_sidebar :: sidebar(activePage='orders')}"></aside>
    <div class="admin-content ml-64 flex min-h-screen flex-1 flex-col">
      <header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-border bg-bg-dark/90 px-6 backdrop-blur-md">
        <nav aria-label="Fil d'Ariane" class="flex items-center gap-2 text-sm">
          <a th:href="@{/admin/dashboard}" class="text-muted hover:text-white">Admin</a>
          <svg class="h-4 w-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          <a th:href="@{/admin/orders}" class="text-muted hover:text-white">Commandes</a>
          <svg class="h-4 w-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          <span class="font-medium text-white" th:text="${order.orderNumber}">GS-000</span>
        </nav>
      </header>
      <main class="flex-1 p-6">
        <div th:replace="~{admin/_alerts :: alerts}"></div>
        <div class="mb-6 flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
          <div>
            <h1 class="text-2xl font-bold text-white" th:text="${order.orderNumber}">Commande</h1>
            <p class="mt-1 text-sm text-muted">
              <span th:text="${#temporals.format(order.createdAt, 'dd MMMM yyyy à HH:mm')}">date</span>
              · <span th:text="${order.billingFirstName + ' ' + order.billingLastName}">Client</span>
            </p>
          </div>
          <div class="flex flex-wrap gap-2">
            <form th:if="${order.status.name() == 'COMPLETED' or order.status.name() == 'PAID'}"
                  th:action="@{/admin/orders/{id}/refund(id=${order.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button type="submit" class="rounded-lg border border-error/50 px-4 py-2 text-sm font-medium text-error hover:bg-error/10"
                      onclick="return confirm('Rembourser cette commande et libérer les clés ?')">Rembourser</button>
            </form>
          </div>
        </div>

        <div class="grid grid-cols-1 gap-6 lg:grid-cols-3">
          <section class="lg:col-span-2 rounded-xl border border-border bg-bg-card p-6">
            <h2 class="text-lg font-semibold text-white mb-4">Articles</h2>
            <ul class="divide-y divide-border">
              <li th:each="item : ${items}" class="flex gap-4 py-4 first:pt-0">
                <img th:src="${item.game.coverImageUrl}" th:alt="${item.game.title}" class="h-16 w-24 rounded object-cover">
                <div class="flex-1">
                  <p class="font-medium text-white" th:text="${item.game.title}">Jeu</p>
                  <p class="text-sm text-muted" th:text="${item.quantity} + ' × ' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)} + ' €'">qty</p>
                  <p th:if="${item.licenseKey != null}" class="mt-1 font-mono text-xs text-brand-cyan-light" th:text="${item.licenseKey.keyValue}">KEY</p>
                </div>
              </li>
            </ul>
          </section>

          <aside class="space-y-6">
            <section class="rounded-xl border border-border bg-bg-card p-6">
              <h2 class="text-lg font-semibold text-white mb-4">Récapitulatif</h2>
              <dl class="space-y-2 text-sm">
                <div class="flex justify-between"><dt class="text-muted">Sous-total</dt><dd th:text="${#numbers.formatDecimal(order.subtotal, 1, 2)} + ' €'">0 €</dd></div>
                <div class="flex justify-between"><dt class="text-muted">Remise</dt><dd th:text="'-' + ${#numbers.formatDecimal(order.discountAmount, 1, 2)} + ' €'">0 €</dd></div>
                <div class="flex justify-between border-t border-border pt-2 font-semibold text-white">
                  <dt>Total</dt><dd th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)} + ' €'">0 €</dd>
                </div>
              </dl>
              <p class="mt-4 text-xs text-muted">Statut actuel :
                <span class="font-medium text-white" th:text="${order.status}">COMPLETED</span>
              </p>
            </section>

            <section class="rounded-xl border border-border bg-bg-card p-6">
              <h2 class="text-lg font-semibold text-white mb-4">Changer le statut</h2>
              <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="space-y-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <select name="status" class="w-full rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
                  <option th:each="s : ${orderStatuses}" th:value="${s}" th:text="${s}"
                          th:selected="${order.status == s}"></option>
                </select>
                <button type="submit" class="w-full rounded-lg bg-brand-purple px-4 py-2 text-sm font-semibold text-white hover:bg-brand-purple-light">Mettre à jour</button>
              </form>
            </section>

            <section class="rounded-xl border border-border bg-bg-card p-6 text-sm">
              <h2 class="text-lg font-semibold text-white mb-3">Facturation</h2>
              <p class="text-white" th:text="${order.billingEmail}">email</p>
              <p class="text-muted mt-1" th:text="${order.billingAddress}">adresse</p>
              <p class="text-muted" th:text="${order.billingPostalCode + ' ' + order.billingCity}">ville</p>
            </section>
          </aside>
        </div>
      </main>
    </div>
  </div>
  <div th:replace="~{_layout :: toasts}"></div>
  <div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
