<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Commandes — Admin GameStore', 'Gestion des commandes — Administration GameStore.')}"></head>
<body class="bg-bg-dark text-text antialiased min-h-screen">
  <div class="flex min-h-screen">
    <aside th:replace="~{admin/_sidebar :: sidebar(activePage='orders')}"></aside>
    <div class="admin-content ml-64 flex min-h-screen flex-1 flex-col">
      <header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-border bg-bg-dark/90 px-6 backdrop-blur-md">
        <nav aria-label="Fil d'Ariane" class="flex items-center gap-2 text-sm">
          <a th:href="@{/admin/dashboard}" class="text-muted hover:text-white">Admin</a>
          <svg class="h-4 w-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          <span class="font-medium text-white">Commandes</span>
        </nav>
        <a th:href="@{/}" target="_blank" rel="noopener" class="hidden items-center gap-1.5 rounded-lg border border-border px-3 py-1.5 text-xs font-medium text-muted transition hover:border-brand-purple/50 hover:text-white sm:inline-flex">
          Voir le site
        </a>
      </header>
      <main class="flex-1 p-6">
        <div th:replace="~{admin/_alerts :: alerts}"></div>
        <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h1 class="text-2xl font-bold text-white">Commandes</h1>
            <p class="mt-1 text-sm text-muted">Suivi et gestion des commandes clients</p>
          </div>
        </div>

        <form th:action="@{/admin/orders}" method="get" class="mb-6 flex flex-wrap items-end gap-3 rounded-xl border border-border bg-bg-card p-4">
          <div class="w-full sm:w-48">
            <label for="status" class="block text-xs font-medium text-muted mb-1">Statut</label>
            <select id="status" name="status" class="w-full rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
              <option value="">Tous</option>
              <option th:each="s : ${orderStatuses}" th:value="${s}" th:text="${s}"
                      th:selected="${statusFilter == s}"></option>
            </select>
          </div>
          <button type="submit" class="rounded-lg border border-border px-4 py-2 text-sm font-medium text-white hover:bg-bg-card-hover">Filtrer</button>
        </form>

        <div class="overflow-hidden rounded-xl border border-border bg-bg-card">
          <div class="overflow-x-auto">
            <table class="w-full min-w-[800px] text-left text-sm">
              <thead class="border-b border-border bg-bg-dark/50">
                <tr>
                  <th class="px-6 py-3 font-medium text-muted">Référence</th>
                  <th class="px-6 py-3 font-medium text-muted">Client</th>
                  <th class="px-6 py-3 font-medium text-muted">Date</th>
                  <th class="px-6 py-3 font-medium text-muted">Total</th>
                  <th class="px-6 py-3 font-medium text-muted">Statut</th>
                  <th class="px-6 py-3 font-medium text-muted">Actions</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-border">
                <tr th:if="${#lists.isEmpty(orders)}">
                  <td colspan="6" class="px-6 py-8 text-center text-muted">Aucune commande.</td>
                </tr>
                <tr th:each="order : ${orders}" class="hover:bg-bg-card-hover/50">
                  <td class="px-6 py-4 font-mono text-brand-cyan-light" th:text="${order.orderNumber}">GS-000</td>
                  <td class="px-6 py-4">
                    <p class="text-white" th:text="${order.customerName}">Client</p>
                    <p class="text-xs text-muted" th:text="${order.customerEmail}">email</p>
                  </td>
                  <td class="px-6 py-4 text-muted" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">date</td>
                  <td class="px-6 py-4 font-semibold text-white" th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)} + ' €'">0 €</td>
                  <td class="px-6 py-4">
                    <span class="rounded-full px-2.5 py-1 text-xs font-medium"
                          th:classappend="${order.status.name() == 'COMPLETED' ? ' bg-success/20 text-success' : (order.status.name() == 'PENDING' ? ' bg-warning/20 text-warning' : (order.status.name() == 'REFUNDED' ? ' bg-muted/20 text-muted' : ' bg-info/20 text-info'))}"
                          th:text="${order.status}">STATUT</span>
                  </td>
                  <td class="px-6 py-4">
                    <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="rounded border border-border px-2 py-1 text-xs text-muted hover:text-white">Voir</a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div th:replace="~{_layout :: toasts}"></div>
  <div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
