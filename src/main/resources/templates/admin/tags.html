<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Tags — Admin', 'Gestion des tags.')}"></head>
<body class="bg-bg-dark text-text antialiased min-h-screen">
<div class="flex min-h-screen">
  <aside th:replace="~{admin/_sidebar :: sidebar(activePage='tags')}"></aside>
  <div class="admin-content ml-64 flex min-h-screen flex-1 flex-col">
    <main class="flex-1 p-6">
      <div th:replace="~{admin/_alerts :: alerts}"></div>
      <h1 class="text-2xl font-bold text-white mb-6">Tags</h1>
      <section class="mb-8 rounded-xl border border-border bg-bg-card p-6">
        <form th:action="@{/admin/tags}" th:object="${tagForm}" method="post" class="grid gap-4 md:grid-cols-3">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <input type="text" th:field="*{label}" placeholder="Label" required class="rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
          <input type="text" th:field="*{slug}" placeholder="Slug (optionnel)" class="rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
          <button type="submit" class="rounded-lg bg-brand-purple px-4 py-2 text-sm text-white">Ajouter</button>
        </form>
      </section>
      <table class="w-full text-sm rounded-xl border border-border bg-bg-card">
        <thead class="bg-bg-dark/50 border-b border-border"><tr><th class="px-6 py-3 text-muted">Label</th><th class="px-6 py-3 text-muted">Slug</th><th class="px-6 py-3 text-muted">Actions</th></tr></thead>
        <tbody class="divide-y divide-border">
          <tr th:each="t : ${tags}">
            <td class="px-6 py-4 text-white" th:text="${t.label}">Tag</td>
            <td class="px-6 py-4 text-muted font-mono" th:text="${t.slug}">slug</td>
            <td class="px-6 py-4 flex gap-2">
              <a th:href="@{/admin/tags/{id}/edit(id=${t.id})}" class="text-brand-cyan-light text-xs">Modifier</a>
              <form th:action="@{/admin/tags/{id}/delete(id=${t.id})}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="text-error text-xs" onclick="return confirm('Supprimer ce tag ?')">Supprimer</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>
</div>
<div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
