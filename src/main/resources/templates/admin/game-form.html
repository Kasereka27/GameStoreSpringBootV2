<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head(${isEdit} ? 'Modifier un jeu — Admin' : 'Nouveau jeu — Admin', 'Formulaire de gestion des jeux — Admin GameStore.')}">
  <title>Formulaire jeu — Admin</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-bg-dark text-text antialiased min-h-screen">

  <div class="flex min-h-screen">
    <aside th:replace="~{admin/_sidebar :: sidebar(activePage='games')}"></aside>

    <div class="admin-content ml-64 flex min-h-screen flex-1 flex-col">
      <header class="sticky top-0 z-30 flex h-16 items-center border-b border-border bg-bg-dark/90 px-6 backdrop-blur-md">
        <h1 class="text-lg font-bold text-white" th:text="${isEdit} ? 'Modifier un jeu' : 'Ajouter un jeu'">Formulaire</h1>
      </header>

      <main class="flex-1 p-6">
        <div th:if="${successMessage}" class="mb-4 rounded-lg border border-success/30 bg-success/10 px-4 py-3 text-sm text-success" th:text="${successMessage}"></div>

        <form th:action="${isEdit} ? @{/admin/games/{id}(id=${gameId})} : @{/admin/games}"
              th:object="${gameForm}" method="post"
              class="mx-auto max-w-3xl space-y-6 rounded-xl border border-border bg-bg-card p-6">

          <div class="grid gap-4 sm:grid-cols-2">
            <div class="sm:col-span-2">
              <label for="title" class="mb-1 block text-sm font-medium text-muted">Titre *</label>
              <input id="title" type="text" th:field="*{title}" required
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
              <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="mt-1 text-xs text-error"></p>
            </div>

            <div class="sm:col-span-2">
              <label for="slug" class="mb-1 block text-sm font-medium text-muted">Slug (URL) *</label>
              <input id="slug" type="text" th:field="*{slug}" required placeholder="elden-ring"
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
              <p th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}" class="mt-1 text-xs text-error"></p>
            </div>

            <div class="sm:col-span-2">
              <label for="shortDescription" class="mb-1 block text-sm font-medium text-muted">Description courte</label>
              <textarea id="shortDescription" th:field="*{shortDescription}" rows="2"
                        class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none"></textarea>
            </div>

            <div class="sm:col-span-2">
              <label for="longDescription" class="mb-1 block text-sm font-medium text-muted">Description longue</label>
              <textarea id="longDescription" th:field="*{longDescription}" rows="5"
                        class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none"></textarea>
            </div>

            <div>
              <label for="publisher" class="mb-1 block text-sm font-medium text-muted">Éditeur</label>
              <input id="publisher" type="text" th:field="*{publisher}"
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
            </div>

            <div>
              <label for="developer" class="mb-1 block text-sm font-medium text-muted">Développeur</label>
              <input id="developer" type="text" th:field="*{developer}"
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
            </div>

            <div>
              <label for="basePrice" class="mb-1 block text-sm font-medium text-muted">Prix de base (€) *</label>
              <input id="basePrice" type="number" step="0.01" min="0" th:field="*{basePrice}" required
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
            </div>

            <div>
              <label for="discountedPrice" class="mb-1 block text-sm font-medium text-muted">Prix promo (€)</label>
              <input id="discountedPrice" type="number" step="0.01" min="0" th:field="*{discountedPrice}"
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
            </div>

            <div>
              <label for="discountEndDate" class="mb-1 block text-sm font-medium text-muted">Fin de promo</label>
              <input id="discountEndDate" type="date" th:field="*{discountEndDate}"
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
            </div>

            <div>
              <label for="platform" class="mb-1 block text-sm font-medium text-muted">Plateforme *</label>
              <select id="platform" th:field="*{platform}"
                      class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
                <option th:each="p : ${T(com.examen.gamestore.domain.enums.Platform).values()}" th:value="${p}" th:text="${p.displayLabel}"></option>
              </select>
            </div>

            <div>
              <label for="status" class="mb-1 block text-sm font-medium text-muted">Statut</label>
              <select id="status" th:field="*{status}"
                      class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
                <option th:each="s : ${T(com.examen.gamestore.domain.enums.GameStatus).values()}" th:value="${s}" th:text="${s}"></option>
              </select>
            </div>

            <div>
              <label for="releaseDate" class="mb-1 block text-sm font-medium text-muted">Date de sortie</label>
              <input id="releaseDate" type="date" th:field="*{releaseDate}"
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
            </div>

            <div>
              <label for="pegiRating" class="mb-1 block text-sm font-medium text-muted">Classification PEGI</label>
              <select id="pegiRating" th:field="*{pegiRating}"
                      class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
                <option value="">—</option>
                <option th:each="p : ${T(com.examen.gamestore.domain.enums.PegiRating).values()}" th:value="${p}" th:text="${p.displayLabel}"></option>
              </select>
            </div>

            <div class="sm:col-span-2">
              <label for="minSpecs" class="mb-1 block text-sm font-medium text-muted">Config minimale (PC)</label>
              <textarea id="minSpecs" th:field="*{minSpecs}" rows="3"
                        class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none"></textarea>
            </div>

            <div class="sm:col-span-2">
              <label for="recommendedSpecs" class="mb-1 block text-sm font-medium text-muted">Config recommandée (PC)</label>
              <textarea id="recommendedSpecs" th:field="*{recommendedSpecs}" rows="3"
                        class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none"></textarea>
            </div>

            <div class="sm:col-span-2">
              <label for="supportedLanguages" class="mb-1 block text-sm font-medium text-muted">Langues supportées</label>
              <input id="supportedLanguages" type="text" th:field="*{supportedLanguages}" placeholder="Français, Anglais, Allemand"
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
            </div>

            <div class="sm:col-span-2">
              <span class="mb-2 block text-sm font-medium text-muted">Genres</span>
              <div class="flex flex-wrap gap-3">
                <label th:each="genre : ${allGenres}" class="flex items-center gap-2 text-sm text-muted">
                  <input type="checkbox" name="genreSlugs" th:value="${genre.slug}"
                         th:checked="${gameForm.genreSlugs != null and gameForm.genreSlugs.contains(genre.slug)}"
                         class="h-4 w-4 rounded border-border">
                  <span th:text="${genre.label}">Action</span>
                </label>
              </div>
            </div>

            <div class="sm:col-span-2">
              <span class="mb-2 block text-sm font-medium text-muted">Tags</span>
              <div class="flex flex-wrap gap-3">
                <label th:each="tag : ${allTags}" class="flex items-center gap-2 text-sm text-muted">
                  <input type="checkbox" name="tagSlugs" th:value="${tag.slug}"
                         th:checked="${gameForm.tagSlugs != null and gameForm.tagSlugs.contains(tag.slug)}"
                         class="h-4 w-4 rounded border-border">
                  <span th:text="${tag.label}">Open World</span>
                </label>
              </div>
            </div>

            <div class="sm:col-span-2">
              <label for="coverImageUrl" class="mb-1 block text-sm font-medium text-muted">URL image de couverture</label>
              <input id="coverImageUrl" type="url" th:field="*{coverImageUrl}"
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
            </div>

            <div class="sm:col-span-2">
              <label for="trailerUrl" class="mb-1 block text-sm font-medium text-muted">URL bande-annonce (YouTube embed)</label>
              <input id="trailerUrl" type="url" th:field="*{trailerUrl}"
                     class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none">
            </div>

            <div class="sm:col-span-2">
              <label for="screenshotUrls" class="mb-1 block text-sm font-medium text-muted">URLs captures d'écran (une par ligne)</label>
              <textarea id="screenshotUrls" th:field="*{screenshotUrls}" rows="4"
                        placeholder="https://…&#10;https://…"
                        class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2 text-white focus:border-brand-purple focus:outline-none"></textarea>
            </div>

            <div class="flex items-center gap-2">
              <input id="featured" type="checkbox" th:field="*{featured}" class="h-4 w-4 rounded border-border">
              <label for="featured" class="text-sm text-muted">Jeu en vedette</label>
            </div>

            <div class="flex items-center gap-2">
              <input id="bestseller" type="checkbox" th:field="*{bestseller}" class="h-4 w-4 rounded border-border">
              <label for="bestseller" class="text-sm text-muted">Meilleure vente</label>
            </div>
          </div>

          <div class="flex flex-wrap gap-3 border-t border-border pt-6">
            <button type="submit" class="rounded-lg bg-brand-purple px-5 py-2.5 text-sm font-semibold text-white hover:bg-brand-purple-light"
                    th:text="${isEdit} ? 'Enregistrer' : 'Créer le jeu'">Enregistrer</button>
            <a th:href="@{/admin/games}" class="rounded-lg border border-border px-5 py-2.5 text-sm font-medium text-muted hover:text-white">Annuler</a>
          </div>
        </form>
      </main>
    </div>
  </div>

</body>
</html>
