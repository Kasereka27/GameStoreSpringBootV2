<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Utilisateurs — Admin', 'Gestion des utilisateurs.')}"></head>
<body class="bg-bg-dark text-text antialiased min-h-screen">
<div class="flex min-h-screen">
  <aside th:replace="~{admin/_sidebar :: sidebar(activePage='users')}"></aside>
  <div class="admin-content ml-64 flex min-h-screen flex-1 flex-col">
    <header class="sticky top-0 z-30 flex h-16 items-center border-b border-border bg-bg-dark/90 px-6">
      <span class="font-medium text-white">Utilisateurs</span>
    </header>
    <main class="flex-1 p-6">
      <div th:replace="~{admin/_alerts :: alerts}"></div>
      <h1 class="text-2xl font-bold text-white mb-4">Utilisateurs</h1>
      <form th:action="@{/admin/users}" method="get" class="mb-6 flex flex-wrap gap-3 rounded-xl border border-border bg-bg-card p-4">
        <input type="search" name="q" th:value="${q}" placeholder="Email, nom…" class="rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
        <select name="role" class="rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
          <option value="">Tous rôles</option>
          <option th:each="r : ${userRoles}" th:value="${r}" th:text="${r}" th:selected="${roleFilter == r}"></option>
        </select>
        <select name="enabled" class="rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
          <option value="">Tous statuts</option>
          <option value="true" th:selected="${enabledFilter == true}">Actifs</option>
          <option value="false" th:selected="${enabledFilter == false}">Inactifs</option>
        </select>
        <button type="submit" class="rounded-lg bg-brand-purple px-4 py-2 text-sm text-white">Filtrer</button>
      </form>
      <div class="overflow-hidden rounded-xl border border-border bg-bg-card">
        <table class="w-full text-left text-sm">
          <thead class="border-b border-border bg-bg-dark/50">
            <tr>
              <th class="px-6 py-3 text-muted">Nom</th>
              <th class="px-6 py-3 text-muted">Email</th>
              <th class="px-6 py-3 text-muted">Rôle</th>
              <th class="px-6 py-3 text-muted">Statut</th>
              <th class="px-6 py-3 text-muted">Inscription</th>
              <th class="px-6 py-3 text-muted"></th>
            </tr>
          </thead>
          <tbody class="divide-y divide-border">
            <tr th:each="u : ${users}" class="hover:bg-bg-card-hover/50">
              <td class="px-6 py-4 text-white" th:text="${u.firstName + ' ' + u.lastName}">Nom</td>
              <td class="px-6 py-4 text-muted" th:text="${u.email}">email</td>
              <td class="px-6 py-4" th:text="${u.role}">ROLE</td>
              <td class="px-6 py-4">
                <span th:if="${u.enabled}" class="text-success text-xs">Actif</span>
                <span th:unless="${u.enabled}" class="text-error text-xs">Inactif</span>
              </td>
              <td class="px-6 py-4 text-muted" th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}">date</td>
              <td class="px-6 py-4"><a th:href="@{/admin/users/{id}(id=${u.id})}" class="text-brand-cyan-light text-xs">Gérer</a></td>
            </tr>
          </tbody>
        </table>
      </div>
      <p class="mt-3 text-sm text-muted" th:text="${totalUsers} + ' utilisateur(s)'">0</p>
    </main>
  </div>
</div>
<div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
