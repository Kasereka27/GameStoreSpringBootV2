<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar(activePage)" class="admin-sidebar fixed inset-y-0 left-0 z-40 flex w-64 flex-col border-r border-border">
  <div class="flex h-16 items-center gap-2.5 border-b border-border px-5">
    <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-brand-purple to-brand-cyan">
      <svg class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M6 9h4v6H6V9zm8 0h4v6h-4V9zM8 11h2v2H8v-2zm6 0h2v2h-2v-2zM4 6h16a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z"/>
      </svg>
    </span>
    <div>
      <p class="text-sm font-bold text-white">GameStore</p>
      <p class="text-[10px] uppercase tracking-wider text-muted">Administration</p>
    </div>
  </div>
  <nav class="flex-1 overflow-y-auto px-3 py-4" aria-label="Menu administration">
    <ul class="space-y-1">
      <li>
        <a th:href="@{/admin/dashboard}"
           th:classappend="${activePage == 'dashboard'} ? ' bg-brand-purple/20 text-brand-cyan-light' : ' text-muted hover:bg-bg-card-hover hover:text-white'"
           class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          Dashboard
        </a>
      </li>
      <li>
        <a th:href="@{/admin/games}"
           th:classappend="${activePage == 'games'} ? ' bg-brand-purple/20 text-brand-cyan-light' : ' text-muted hover:bg-bg-card-hover hover:text-white'"
           class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Jeux
        </a>
      </li>
      <li>
        <a th:href="@{/admin/licenses}"
           th:classappend="${activePage == 'licenses'} ? ' bg-brand-purple/20 text-brand-cyan-light' : ' text-muted hover:bg-bg-card-hover hover:text-white'"
           class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
          Licences
        </a>
      </li>
      <li>
        <a th:href="@{/admin/orders}"
           th:classappend="${activePage == 'orders'} ? ' bg-brand-purple/20 text-brand-cyan-light' : ' text-muted hover:bg-bg-card-hover hover:text-white'"
           class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          Commandes
          <span th:if="${pendingOrdersCount > 0}"
                class="ml-auto flex h-5 min-w-5 items-center justify-center rounded-full bg-error px-1.5 text-[10px] font-bold text-white"
                th:text="${pendingOrdersCount}">0</span>
        </a>
      </li>
      <li>
        <a th:href="@{/admin/users}"
           th:classappend="${activePage == 'users'} ? ' bg-brand-purple/20 text-brand-cyan-light' : ' text-muted hover:bg-bg-card-hover hover:text-white'"
           class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          Utilisateurs
        </a>
      </li>
      <li>
        <a th:href="@{/admin/genres}"
           th:classappend="${activePage == 'genres'} ? ' bg-brand-purple/20 text-brand-cyan-light' : ' text-muted hover:bg-bg-card-hover hover:text-white'"
           class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
          Genres
        </a>
      </li>
      <li>
        <a th:href="@{/admin/tags}"
           th:classappend="${activePage == 'tags'} ? ' bg-brand-purple/20 text-brand-cyan-light' : ' text-muted hover:bg-bg-card-hover hover:text-white'"
           class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/></svg>
          Tags
        </a>
      </li>
      <li>
        <a th:href="@{/admin/reviews}"
           th:classappend="${activePage == 'reviews'} ? ' bg-brand-purple/20 text-brand-cyan-light' : ' text-muted hover:bg-bg-card-hover hover:text-white'"
           class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
          Avis
        </a>
      </li>
      <li>
        <a th:href="@{/admin/promos}"
           th:classappend="${activePage == 'promos'} ? ' bg-brand-purple/20 text-brand-cyan-light' : ' text-muted hover:bg-bg-card-hover hover:text-white'"
           class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
          Promotions
        </a>
      </li>
      <li>
        <a th:href="@{/admin/reports}"
           th:classappend="${activePage == 'reports'} ? ' bg-brand-purple/20 text-brand-cyan-light' : ' text-muted hover:bg-bg-card-hover hover:text-white'"
           class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          Rapports
        </a>
      </li>
    </ul>
  </nav>
  <div class="border-t border-border p-4">
    <a th:href="@{/}" class="flex items-center gap-2 text-xs text-muted transition hover:text-brand-cyan-light">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      Retour au site
    </a>
  </div>
</aside>

</body>
</html>
