<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Avis — Admin', 'Modération des avis.')}"></head>
<body class="bg-bg-dark text-text antialiased min-h-screen">
<div class="flex min-h-screen">
  <aside th:replace="~{admin/_sidebar :: sidebar(activePage='reviews')}"></aside>
  <div class="admin-content ml-64 flex flex-1 flex-col p-6">
    <div th:replace="~{admin/_alerts :: alerts}"></div>
    <h1 class="text-2xl font-bold text-white mb-4">Modération des avis</h1>
    <form th:action="@{/admin/reviews}" method="get" class="mb-6 flex gap-3">
      <select name="gameId" class="rounded-lg border border-border bg-bg-dark px-3 py-2 text-sm text-white">
        <option value="">Tous les jeux</option>
        <option th:each="g : ${games}" th:value="${g.id}" th:text="${g.title}" th:selected="${gameIdFilter == g.id}"></option>
      </select>
      <button type="submit" class="rounded-lg bg-brand-purple px-4 py-2 text-sm text-white">Filtrer</button>
    </form>
    <table class="w-full text-sm rounded-xl border border-border bg-bg-card">
      <thead class="bg-bg-dark/50 border-b border-border">
        <tr><th class="px-6 py-3 text-muted">Jeu</th><th class="px-6 py-3 text-muted">Auteur</th><th class="px-6 py-3 text-muted">Note</th><th class="px-6 py-3 text-muted">Commentaire</th><th class="px-6 py-3 text-muted"></th></tr>
      </thead>
      <tbody class="divide-y divide-border">
        <tr th:each="r : ${reviews}">
          <td class="px-6 py-4"><a th:href="@{/jeu/{slug}(slug=${r.gameSlug})}" th:text="${r.gameTitle}" class="text-brand-cyan-light">Jeu</a></td>
          <td class="px-6 py-4 text-white" th:text="${r.authorName}">Auteur</td>
          <td class="px-6 py-4" th:text="${r.rating} + '/5'">5/5</td>
          <td class="px-6 py-4 text-muted max-w-xs truncate" th:text="${r.content}">...</td>
          <td class="px-6 py-4">
            <form th:action="@{/admin/reviews/{id}/delete(id=${r.id})}" method="post" class="inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button type="submit" class="text-error text-xs" onclick="return confirm('Supprimer cet avis ?')">Supprimer</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
