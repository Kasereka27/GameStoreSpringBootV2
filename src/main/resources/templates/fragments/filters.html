<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<form th:fragment="filter-form(cataloguePath, filters, currentSort, genres, platforms, mobileId)"
      th:action="${cataloguePath}" method="get" class="filter-form">
  <input type="hidden" name="sort" th:value="${currentSort}">

  <h2 th:if="${mobileId == null}" class="text-sm font-semibold text-white">Recherche</h2>
  <label th:for="${mobileId != null ? 'filter-q-' + mobileId : 'filter-q'}" class="sr-only">Rechercher</label>
  <input type="search"
         th:id="${mobileId != null ? 'filter-q-' + mobileId : 'filter-q'}"
         name="q" th:value="${filters.query}"
         class="mt-3 w-full rounded-lg border border-gaming-border bg-gaming-bg px-3 py-2 text-sm text-white placeholder-gaming-muted focus:border-gaming-purple focus:outline-none"
         placeholder="Nom du jeu…">

  <h2 th:class="${mobileId != null ? 'mt-4 text-sm font-semibold text-white' : 'mt-6 text-sm font-semibold text-white'}">Genre</h2>
  <fieldset class="mt-3 space-y-2">
    <legend class="sr-only">Filtrer par genre</legend>
    <label th:each="genre : ${genres}" class="flex cursor-pointer items-center gap-2">
      <input type="checkbox" name="genre" th:value="${genre.slug}"
             th:checked="${filters.genres != null and filters.genres.contains(genre.slug)}"
             class="h-4 w-4 rounded border-gaming-border bg-gaming-bg text-gaming-purple focus:ring-gaming-purple">
      <span class="text-sm text-gaming-muted" th:text="${genre.label}">Action</span>
    </label>
  </fieldset>

  <h2 th:class="${mobileId != null ? 'mt-4 text-sm font-semibold text-white' : 'mt-6 text-sm font-semibold text-white'}">Plateforme</h2>
  <fieldset class="mt-3 space-y-2">
    <legend class="sr-only">Filtrer par plateforme</legend>
    <label th:each="platform : ${platforms}" class="flex cursor-pointer items-center gap-2">
      <input type="radio" name="platform" th:value="${platform}"
             th:checked="${filters.platform == platform}"
             class="h-4 w-4 border-gaming-border bg-gaming-bg text-gaming-purple focus:ring-gaming-purple">
      <span class="text-sm text-gaming-muted" th:text="${platform.displayLabel}">PC</span>
    </label>
    <label class="flex cursor-pointer items-center gap-2">
      <input type="radio" name="platform" value="" th:checked="${filters.platform == null}"
             class="h-4 w-4 border-gaming-border bg-gaming-bg text-gaming-purple focus:ring-gaming-purple">
      <span class="text-sm text-gaming-muted">Toutes</span>
    </label>
  </fieldset>

  <h2 th:class="${mobileId != null ? 'mt-4 text-sm font-semibold text-white' : 'mt-6 text-sm font-semibold text-white'}">Prix max</h2>
  <div class="mt-3">
    <label th:for="${mobileId != null ? 'price-max-' + mobileId : 'price-max'}" class="sr-only">Prix maximum</label>
    <input type="number" step="1" min="0" max="200"
           th:id="${mobileId != null ? 'price-max-' + mobileId : 'price-max'}"
           name="priceMax" th:value="${filters.priceMax != null ? filters.priceMax : 100}"
           class="w-full rounded-lg border border-gaming-border bg-gaming-bg px-3 py-2 text-sm text-white focus:border-gaming-purple focus:outline-none">
  </div>

  <button type="submit"
          th:class="${mobileId != null ? 'mt-4 w-full rounded-lg bg-gaming-purple px-4 py-2 text-sm font-semibold text-white transition hover:bg-gaming-purple-light' : 'mt-6 w-full rounded-lg bg-gaming-purple px-4 py-2 text-sm font-semibold text-white transition hover:bg-gaming-purple-light'}">
    Appliquer les filtres
  </button>
  <a th:href="${cataloguePath}"
     th:class="${mobileId != null ? 'mt-3 block w-full rounded-lg border border-gaming-border px-4 py-2 text-center text-sm font-medium text-gaming-muted transition hover:border-gaming-purple hover:text-white' : 'mt-3 block w-full rounded-lg border border-gaming-border px-4 py-2 text-center text-sm font-medium text-gaming-muted transition hover:border-gaming-purple hover:text-white'}">
    Réinitialiser
  </a>
</form>

</html>
