<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<li th:fragment="card (game)">
  <article class="group card-glow gradient-border overflow-hidden rounded-xl bg-bg-card transition">
    <a th:href="@{/jeu/{slug}(slug=${game.slug})}" class="block">
      <figure class="relative aspect-[16/10] overflow-hidden">
        <img th:src="${game.coverImageUrl}" th:alt="${game.title}"
             class="h-full w-full object-cover transition duration-300 group-hover:scale-105" loading="lazy">
        <span th:if="${game.onPromotion}"
              class="absolute left-3 top-3 rounded bg-brand-purple px-2 py-0.5 text-xs font-bold text-white">Promo</span>
        <span th:if="${game.bestseller and !game.onPromotion}"
              class="absolute left-3 top-3 rounded bg-brand-cyan px-2 py-0.5 text-xs font-bold text-bg-dark">Best-seller</span>
      </figure>
      <div class="p-4">
        <span class="rounded bg-bg-card-hover px-1.5 py-0.5 text-[10px] font-bold text-white"
              th:text="${game.platform.displayLabel}">PC</span>
        <h3 class="mt-2 font-semibold text-white line-clamp-1" th:text="${game.title}">Titre</h3>
        <div class="mt-1 flex items-center gap-1 text-yellow-400">
          <svg class="h-3.5 w-3.5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
          <span class="text-xs text-muted" th:text="${game.averageRating}">4.5</span>
        </div>
        <p class="mt-2 text-lg font-bold text-white" th:text="${#numbers.formatDecimal(game.effectivePrice, 1, 2)} + ' €'">41,99 €</p>
      </div>
    </a>
  </article>
</li>

</html>
