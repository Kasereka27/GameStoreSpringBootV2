<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<li th:fragment="item (item)" data-cart-item th:attr="data-unit-price=${item.unitPrice}, data-item-id=${item.id}">
  <article class="card-glow flex gap-4 overflow-hidden rounded-xl border border-border bg-bg-card p-4 transition sm:gap-6 sm:p-5">
    <a th:href="@{/jeu/{slug}(slug=${item.slug})}" class="shrink-0">
      <img th:src="${item.coverImageUrl}" th:alt="${item.title}"
           class="h-20 w-28 rounded-lg object-cover sm:h-24 sm:w-32" loading="lazy">
    </a>
    <div class="flex min-w-0 flex-1 flex-col">
      <div class="flex items-start justify-between gap-2">
        <div>
          <h3 class="truncate font-semibold text-white" th:text="${item.title}">Titre</h3>
          <p class="mt-0.5 text-xs text-brand-cyan-light" th:text="${item.platform.displayLabel}">PC</p>
          <p class="mt-1 text-xs text-muted">Livraison instantanée par e-mail</p>
        </div>
        <form th:action="@{/panier/articles/{id}/supprimer(id=${item.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" class="shrink-0 rounded-lg p-1.5 text-muted transition hover:bg-error/10 hover:text-error"
                  th:attr="aria-label='Retirer ' + ${item.title} + ' du panier'">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </form>
      </div>
      <div class="mt-auto flex flex-wrap items-center justify-between gap-3 pt-4">
        <form th:action="@{/panier/articles/{id}/quantite(id=${item.id})}" method="post" class="flex items-center rounded-lg border border-border bg-bg-dark">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" name="quantity" th:value="${item.quantity - 1}" th:disabled="${item.quantity <= 1}"
                  class="px-3 py-1.5 text-muted transition hover:text-white disabled:opacity-40" aria-label="Diminuer">−</button>
          <span class="w-12 border-x border-border py-1.5 text-center text-sm text-white" th:text="${item.quantity}">1</span>
          <button type="submit" name="quantity" th:value="${item.quantity + 1}" th:disabled="${item.quantity >= 10}"
                  class="px-3 py-1.5 text-muted transition hover:text-white disabled:opacity-40" aria-label="Augmenter">+</button>
        </form>
        <p class="text-lg font-bold text-white" th:text="${#numbers.formatDecimal(item.lineTotal, 1, 2)} + ' €'">29,99 €</p>
      </div>
    </div>
  </article>
</li>

</html>
