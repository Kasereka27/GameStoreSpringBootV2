<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<nav th:fragment="pagination(page, filters, currentSort, cataloguePath)" aria-label="Pagination"
     th:if="${page.totalPages > 1}">
  <ul class="flex items-center gap-1">
    <li th:if="${page.page > 1}">
      <a th:href="@{${cataloguePath}(page=${page.page - 1}, q=${filters.query}, platform=${filters.platform}, priceMin=${filters.priceMin}, priceMax=${filters.priceMax}, sort=${currentSort}, genre=${filters.genres})}"
         class="rounded-lg border border-gaming-border px-3 py-2 text-sm text-gaming-muted transition hover:border-gaming-purple hover:text-white">Précédent</a>
    </li>
    <li th:if="${page.page <= 1}">
      <span class="rounded-lg border border-gaming-border px-3 py-2 text-sm text-gaming-muted" aria-disabled="true">Précédent</span>
    </li>

    <li th:each="p : ${#numbers.sequence(1, page.totalPages)}"
        th:if="${p == 1 or p == page.totalPages or (p >= page.page - 1 and p <= page.page + 1)}">
      <a th:if="${p != page.page}"
         th:href="@{${cataloguePath}(page=${p}, q=${filters.query}, platform=${filters.platform}, priceMin=${filters.priceMin}, priceMax=${filters.priceMax}, sort=${currentSort}, genre=${filters.genres})}"
         class="rounded-lg border border-gaming-border px-3 py-2 text-sm text-gaming-muted transition hover:border-gaming-purple hover:text-white"
         th:text="${p}">1</a>
      <span th:if="${p == page.page}"
            class="rounded-lg bg-gaming-purple px-3 py-2 text-sm font-medium text-white"
            th:text="${p}" aria-current="page">1</span>
    </li>
    <li th:if="${page.page < page.totalPages - 2}">
      <span class="px-2 text-gaming-muted">…</span>
    </li>

    <li th:if="${page.page < page.totalPages}">
      <a th:href="@{${cataloguePath}(page=${page.page + 1}, q=${filters.query}, platform=${filters.platform}, priceMin=${filters.priceMin}, priceMax=${filters.priceMax}, sort=${currentSort}, genre=${filters.genres})}"
         class="rounded-lg border border-gaming-border px-3 py-2 text-sm text-gaming-muted transition hover:border-gaming-purple hover:text-white">Suivant</a>
    </li>
    <li th:if="${page.page >= page.totalPages}">
      <span class="rounded-lg border border-gaming-border px-3 py-2 text-sm text-gaming-muted" aria-disabled="true">Suivant</span>
    </li>
  </ul>
</nav>

</html>
