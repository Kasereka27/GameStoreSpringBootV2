<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Genres')}"></head>
<body class="min-h-screen bg-slate-100 text-slate-800 antialiased">
<div th:replace="~{fragments/header :: header}"></div>
<main class="max-w-5xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <div th:replace="~{fragments/alert :: success(${message})}"></div>
        <div th:replace="~{fragments/alert :: error(${error})}"></div>

        <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
            <h2 class="text-2xl font-semibold text-slate-900">Genres</h2>
            <a th:href="@{/genres/new}"
               class="inline-flex items-center rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 transition-colors">
                + Nouveau genre
            </a>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-slate-50 text-slate-600 uppercase text-xs tracking-wide">
                <tr>
                    <th class="px-4 py-3 text-left font-medium">Label</th>
                    <th class="px-4 py-3 text-left font-medium">Slug</th>
                    <th class="px-4 py-3 text-left font-medium">Actions</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr th:each="genre : ${genres}" class="hover:bg-slate-50">
                    <td class="px-4 py-3 font-medium" th:text="${genre.label}">Label</td>
                    <td class="px-4 py-3 text-slate-500 font-mono text-xs" th:text="${genre.slug}">slug</td>
                    <td class="px-4 py-3">
                        <div class="flex flex-wrap gap-2">
                            <a th:href="@{/genres/{id}/edit(id=${genre.id})}"
                               class="text-indigo-600 hover:text-indigo-800 font-medium">Modifier</a>
                            <form th:action="@{/genres/{id}/delete(id=${genre.id})}" method="post" class="inline">
                                <button type="submit"
                                        class="text-red-600 hover:text-red-800 font-medium">Supprimer</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
