<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Mot de passe oublié — GameStore Platform', 'Réinitialisez votre mot de passe GameStore Platform.')}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Réinitialisez votre mot de passe GameStore Platform.">
  <title>Mot de passe oublié — GameStore Platform</title>

  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-bg-dark text-text antialiased min-h-screen flex flex-col">

  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden" aria-hidden="true">
    <div class="absolute -left-1/4 top-0 h-[600px] w-[600px] rounded-full bg-brand-purple/20 blur-[120px]"></div>
    <div class="absolute -right-1/4 bottom-0 h-[500px] w-[500px] rounded-full bg-brand-cyan/15 blur-[100px]"></div>
    <div class="absolute inset-0 bg-gradient-to-br from-bg-dark via-bg-dark/95 to-[#12121f]"></div>
  </div>

    <header th:replace="~{_layout :: auth-header}"></header>

  <main class="relative flex flex-1 items-center justify-center px-4 py-10 sm:py-14">
    <div class="w-full max-w-md">

      <div class="text-center">
        <h1 class="text-2xl font-bold text-white sm:text-3xl">Mot de passe oublié</h1>
        <p class="mt-2 text-sm text-muted">Entrez votre e-mail pour recevoir un lien de réinitialisation.</p>
      </div>

      <form th:if="${!resetEmailSent}" class="mt-8 rounded-2xl border border-border bg-bg-card/80 p-6 shadow-xl backdrop-blur-sm sm:p-8 card-glow"
            th:action="@{/mot-de-passe-oublie}" th:object="${forgotPasswordForm}" method="post">

        <div>
          <label for="email" class="block text-sm font-medium text-muted">Adresse e-mail</label>
          <input type="email" id="email" th:field="*{email}" required autocomplete="email"
                 class="mt-1.5 w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 text-sm text-white placeholder-muted focus:border-brand-purple focus:outline-none focus:ring-1 focus:ring-brand-purple"
                 placeholder="votre@email.com">
          <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="mt-1 text-xs text-error"></p>
        </div>

        <button type="submit"
                class="mt-6 w-full rounded-lg bg-gradient-to-r from-brand-purple to-brand-purple-light py-3 text-sm font-semibold text-white transition hover:opacity-90">
          Envoyer le lien
        </button>
      </form>

      <div th:if="${resetEmailSent}" role="status"
           class="mt-8 rounded-2xl border border-success/30 bg-success/10 p-6 text-center sm:p-8">
        <h2 class="text-lg font-semibold text-white">E-mail envoyé !</h2>
        <p class="mt-2 text-sm text-muted">
          Si un compte existe avec cette adresse, vous recevrez un lien de réinitialisation sous quelques minutes.
          En développement, consultez les logs serveur pour le lien.
        </p>
      </div>

      <p class="mt-6 text-center text-sm text-muted">
        <a th:href="@{/login}" class="inline-flex items-center gap-1.5 font-medium text-brand-cyan-light transition hover:underline">
          Retour à la connexion
        </a>
      </p>
    </div>
  </main>

  <footer th:replace="~{_layout :: auth-footer}"></footer>

  <div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
