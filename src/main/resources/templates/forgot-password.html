<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Réinitialisez votre mot de passe GameStore Platform.">
  <title>Mot de passe oublié — GameStore Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-brand-purple: #7c3aed;
      --color-brand-purple-light: #8b5cf6;
      --color-brand-cyan: #06b6d4;
      --color-brand-cyan-light: #22d3ee;
      --color-bg-dark: #0f0f13;
      --color-bg-card: #1a1a24;
      --color-bg-card-hover: #252532;
      --color-border: #2e2e3a;
      --color-text: #e4e4e7;
      --color-muted: #71717a;
      --color-success: #22c55e;
      --color-error: #ef4444;
      --color-info: #3b82f6;
    }
  </style>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body class="bg-bg-dark text-text antialiased min-h-screen flex flex-col">

  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden" aria-hidden="true">
    <div class="absolute -left-1/4 top-0 h-[600px] w-[600px] rounded-full bg-brand-purple/20 blur-[120px]"></div>
    <div class="absolute -right-1/4 bottom-0 h-[500px] w-[500px] rounded-full bg-brand-cyan/15 blur-[100px]"></div>
    <div class="absolute inset-0 bg-gradient-to-br from-bg-dark via-bg-dark/95 to-[#12121f]"></div>
  </div>

  <!-- THYMELEAF: th:replace="~{_layout :: auth-header}" -->
  <header class="relative border-b border-border/50 bg-bg-dark/60 backdrop-blur-sm">
    <div class="mx-auto flex max-w-7xl items-center px-4 py-4 sm:px-6 lg:px-8">
      <a href="index.html" class="flex items-center gap-2.5" aria-label="GameStore — Accueil">
        <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-brand-purple to-brand-cyan">
          <svg class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M6 9h4v6H6V9zm8 0h4v6h-4V9zM8 11h2v2H8v-2zm6 0h2v2h-2v-2zM4 6h16a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z"/>
          </svg>
        </span>
        <span class="font-bold text-white">Game<span class="gradient-text">Store</span></span>
      </a>
    </div>
  </header>

  <main class="relative flex flex-1 items-center justify-center px-4 py-10 sm:py-14">
    <div class="w-full max-w-md">

      <div class="text-center">
        <h1 class="text-2xl font-bold text-white sm:text-3xl">Mot de passe oublié</h1>
        <p class="mt-2 text-sm text-muted">Entrez votre e-mail pour recevoir un lien de réinitialisation.</p>
      </div>

      <!-- THYMELEAF: th:action="@{/mot-de-passe-oublie}" th:object="${forgotPasswordForm}" method="post" -->
      <form class="mt-8 rounded-2xl border border-border bg-bg-card/80 p-6 shadow-xl backdrop-blur-sm sm:p-8 card-glow"
            data-forgot-form action="#" method="post" novalidate>

        <!-- THYMELEAF: th:if="${param.error}" -->
        <!-- <div role="alert" class="mb-4 rounded-lg border border-error/30 bg-error/10 px-4 py-3 text-sm text-error">
          Aucun compte associé à cette adresse e-mail.
        </div> -->

        <div>
          <label for="email" class="block text-sm font-medium text-muted">Adresse e-mail</label>
          <input type="email" id="email" name="email" required autocomplete="email"
                 class="mt-1.5 w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 text-sm text-white placeholder-muted focus:border-brand-purple focus:outline-none focus:ring-1 focus:ring-brand-purple"
                 placeholder="votre@email.com">
          <!-- THYMELEAF: th:field="*{email}" -->
          <!-- THYMELEAF: th:errors="*{email}" class="mt-1 text-xs text-error" -->
        </div>

        <button type="submit"
                class="mt-6 w-full rounded-lg bg-gradient-to-r from-brand-purple to-brand-purple-light py-3 text-sm font-semibold text-white transition hover:opacity-90">
          Envoyer le lien
        </button>
      </form>

      <!-- THYMELEAF: th:if="${success}" -->
      <div data-forgot-success role="status"
           class="mt-8 hidden rounded-2xl border border-success/30 bg-success/10 p-6 text-center sm:p-8">
        <span class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-success/20 text-success animate-check" aria-hidden="true">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </span>
        <h2 class="mt-4 text-lg font-semibold text-white">E-mail envoyé !</h2>
        <p class="mt-2 text-sm text-muted">
          Si un compte existe avec cette adresse, vous recevrez un lien de réinitialisation sous quelques minutes.
          <!-- THYMELEAF: th:text="${successMessage}" -->
        </p>
      </div>

      <p class="mt-6 text-center text-sm text-muted">
        <a href="login.html" class="inline-flex items-center gap-1.5 font-medium text-brand-cyan-light transition hover:underline">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Retour à la connexion
        </a>
        <!-- THYMELEAF: th:href="@{/login}" -->
      </p>
    </div>
  </main>

  <footer class="relative mt-auto border-t border-border/50 bg-bg-card/30 py-6 text-center text-xs text-muted">
    &copy; 2026 GameStore Platform.
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
