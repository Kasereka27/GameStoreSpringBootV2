<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Commande confirmée — GameStore Platform', 'Votre commande GameStore a été confirmée. Vos clés sont disponibles dans votre bibliothèque.')}"></head>
<body class="bg-bg-dark text-text antialiased min-h-screen flex flex-col">

  <header th:replace="~{_layout :: navbar}"></header>

  <main class="flex-1">
    <div class="mx-auto max-w-3xl px-4 py-12 sm:px-6 lg:px-8 text-center">
      <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-success/20 text-success">
        <svg class="h-10 w-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h1 class="mt-6 text-3xl font-bold text-white">Commande confirmée !</h1>
      <p class="mt-3 text-muted">Merci pour votre achat. Vos clés de jeux sont disponibles immédiatement.</p>
      <p class="mt-2 text-sm text-muted">N° de commande : <span class="font-mono text-white" th:text="${order.orderNumber}">GS-00000000-0000</span></p>
      <p class="mt-1 text-lg font-bold text-white" th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)} + ' €'">0,00 €</p>

      <ul class="mt-8 space-y-3 text-left">
        <li th:each="item : ${order.items}" class="rounded-xl border border-border bg-bg-card p-4 flex items-center gap-4">
          <img th:src="${item.game.coverImageUrl}" th:alt="${item.game.title}" class="h-14 w-20 rounded-lg object-cover">
          <div class="min-w-0 flex-1">
            <p class="font-semibold text-white" th:text="${item.game.title}">Jeu</p>
            <p th:if="${item.licenseKey != null}" class="mt-1 font-mono text-xs text-brand-cyan-light break-all" th:text="${item.licenseKey.keyValue}">XXXX-XXXX</p>
          </div>
        </li>
      </ul>

      <div class="mt-10 flex flex-wrap justify-center gap-3">
        <a th:href="@{/compte/bibliotheque}" class="rounded-lg bg-brand-purple px-6 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-purple-light">Ma bibliothèque</a>
        <a th:href="@{/catalogue}" class="rounded-lg border border-border px-6 py-2.5 text-sm font-semibold text-white transition hover:bg-bg-card-hover">Continuer mes achats</a>
      </div>
    </div>
  </main>

  <footer th:replace="~{_layout :: footer}"></footer>
  <div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
