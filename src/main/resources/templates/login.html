<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Connectez-vous à votre compte GameStore Platform.">
  <title>Connexion — GameStore Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-brand-purple: #7c3aed;
      --color-brand-purple-light: #8b5cf6;
      --color-brand-cyan: #06b6d4;
      --color-brand-cyan-light: #22d3ee;
      --color-bg-dark: #0f0f13;
      --color-bg-card: #1a1a24;
      --color-bg-card-hover: #252532;
      --color-border: #2e2e3a;
      --color-text: #e4e4e7;
      --color-muted: #71717a;
      --color-success: #22c55e;
      --color-error: #ef4444;
      --color-info: #3b82f6;
      --color-warning: #eab308;
    }
  </style>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body class="bg-bg-dark text-text antialiased min-h-screen flex flex-col">

  <!-- Fond dégradé gaming -->
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden" aria-hidden="true">
    <div class="absolute -left-1/4 top-0 h-[600px] w-[600px] rounded-full bg-brand-purple/20 blur-[120px]"></div>
    <div class="absolute -right-1/4 bottom-0 h-[500px] w-[500px] rounded-full bg-brand-cyan/15 blur-[100px]"></div>
    <div class="absolute inset-0 bg-gradient-to-br from-bg-dark via-bg-dark/95 to-[#12121f]"></div>
  </div>

  <!-- THYMELEAF: th:replace="~{_layout :: auth-header}" -->
  <header class="relative border-b border-border/50 bg-bg-dark/60 backdrop-blur-sm">
    <div class="mx-auto flex max-w-7xl items-center px-4 py-4 sm:px-6 lg:px-8">
      <a href="index.html" class="flex items-center gap-2.5" aria-label="GameStore — Accueil">
        <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-brand-purple to-brand-cyan">
          <svg class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M6 9h4v6H6V9zm8 0h4v6h-4V9zM8 11h2v2H8v-2zm6 0h2v2h-2v-2zM4 6h16a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z"/>
          </svg>
        </span>
        <span class="font-bold text-white">Game<span class="gradient-text">Store</span></span>
      </a>
    </div>
  </header>

  <main class="relative flex flex-1 items-center justify-center px-4 py-10 sm:py-14">
    <div class="w-full max-w-md">

      <div class="text-center">
        <h1 class="text-2xl font-bold text-white sm:text-3xl">Bon retour, gamer !</h1>
        <p class="mt-2 text-sm text-muted">Connectez-vous pour accéder à vos commandes et clés.</p>
      </div>

      <!-- THYMELEAF: th:action="@{/login}" th:object="${loginForm}" method="post" -->
      <form class="mt-8 rounded-2xl border border-border bg-bg-card/80 p-6 shadow-xl backdrop-blur-sm sm:p-8 card-glow"
            data-login-form action="account.html" method="post" novalidate>

        <!-- THYMELEAF: th:if="${param.error}" -->
        <div role="alert" data-login-error
             class="mb-4 hidden rounded-lg border border-error/30 bg-error/10 px-4 py-3 text-sm text-error">
          <!-- THYMELEAF: th:text="${session.SPRING_SECURITY_LAST_EXCEPTION?.message}" -->
          Identifiants incorrects. Vérifiez votre e-mail et votre mot de passe.
        </div>

        <!-- THYMELEAF: th:if="${#fields.hasErrors('*')}" -->
        <!-- <ul class="mb-4 space-y-1 rounded-lg border border-error/30 bg-error/10 px-4 py-3 text-sm text-error">
          <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
        </ul> -->

        <div>
          <label for="email" class="block text-sm font-medium text-muted">Adresse e-mail</label>
          <input type="email" id="email" name="email" required autocomplete="email"
                 class="mt-1.5 w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 text-sm text-white placeholder-muted focus:border-brand-purple focus:outline-none focus:ring-1 focus:ring-brand-purple"
                 placeholder="votre@email.com">
          <!-- THYMELEAF: th:field="*{email}" -->
          <!-- THYMELEAF: th:errors="*{email}" class="mt-1 text-xs text-error" -->
        </div>

        <div class="mt-4">
          <div class="flex items-center justify-between">
            <label for="password" class="block text-sm font-medium text-muted">Mot de passe</label>
            <a href="forgot-password.html" class="text-xs text-brand-cyan-light transition hover:underline">
              Mot de passe oublié ?
            </a>
            <!-- THYMELEAF: th:href="@{/mot-de-passe-oublie}" -->
          </div>
          <div class="relative mt-1.5">
            <input type="password" id="password" name="password" required autocomplete="current-password"
                   class="w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 pr-10 text-sm text-white placeholder-muted focus:border-brand-purple focus:outline-none focus:ring-1 focus:ring-brand-purple"
                   placeholder="••••••••">
            <!-- THYMELEAF: th:field="*{password}" -->
            <!-- THYMELEAF: th:errors="*{password}" class="mt-1 text-xs text-error" -->
            <button type="button" data-password-toggle aria-controls="password" aria-label="Afficher le mot de passe"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-muted transition hover:text-white">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="mt-4 flex items-center justify-between gap-3">
          <label class="flex cursor-pointer items-center gap-2">
            <input type="checkbox" name="rememberMe"
                   class="h-4 w-4 rounded border-border bg-bg-dark text-brand-purple focus:ring-brand-purple">
            <!-- THYMELEAF: th:field="*{rememberMe}" -->
            <span class="text-sm text-muted">Se souvenir de moi</span>
          </label>
          <p class="text-xs text-muted" aria-live="polite">
            <!-- THYMELEAF: th:text="${loginAttempts} + '/' + ${maxLoginAttempts} + ' tentatives'" -->
            <span class="font-medium text-warning">2/5</span> tentatives
          </p>
        </div>

        <button type="submit" data-login-submit
                class="mt-6 flex w-full items-center justify-center gap-2 rounded-lg bg-gradient-to-r from-brand-purple to-brand-purple-light py-3 text-sm font-semibold text-white transition hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-60">
          Se connecter
        </button>

        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center" aria-hidden="true">
            <div class="w-full border-t border-border"></div>
          </div>
          <div class="relative flex justify-center text-xs">
            <span class="bg-bg-card px-2 text-muted">ou continuer avec</span>
          </div>
        </div>

        <!-- THYMELEAF: th:href="@{/oauth2/authorization/google}" -->
        <button type="button"
                class="flex w-full items-center justify-center gap-3 rounded-lg border border-border py-2.5 text-sm text-muted transition hover:border-brand-purple/50 hover:bg-bg-card-hover hover:text-white">
          <svg class="h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continuer avec Google
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-muted">
        Pas encore de compte ?
        <a href="register.html" class="font-medium text-brand-cyan-light transition hover:underline">Créer un compte</a>
        <!-- THYMELEAF: th:href="@{/inscription}" -->
      </p>
    </div>
  </main>

  <footer class="relative mt-auto border-t border-border/50 bg-bg-card/30 py-6 text-center text-xs text-muted">
    &copy; 2026 GameStore Platform.
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
