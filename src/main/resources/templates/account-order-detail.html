<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Commande — Mon compte', 'Détail de commande GameStore.')}"></head>
<body class="bg-bg-dark text-text antialiased min-h-screen">
  <div th:replace="~{_layout :: header}"></div>
  <main class="mx-auto max-w-4xl px-4 py-10">
    <nav class="mb-6 text-sm">
      <a th:href="@{/compte/commandes}" class="text-muted hover:text-white">← Mes commandes</a>
    </nav>
    <h1 class="text-2xl font-bold text-white" th:text="${order.orderNumber}">GS-000</h1>
    <p class="text-sm text-muted mt-1" th:text="${#temporals.format(order.createdAt, 'dd MMMM yyyy à HH:mm')}">date</p>
    <p class="mt-2"><span class="rounded-full bg-success/20 px-2 py-1 text-xs text-success" th:text="${order.status}">COMPLETED</span></p>

    <section class="mt-8 rounded-xl border border-border bg-bg-card p-6">
      <h2 class="text-lg font-semibold text-white mb-4">Articles</h2>
      <ul class="divide-y divide-border">
        <li th:each="item : ${items}" class="flex gap-4 py-4 first:pt-0">
          <img th:src="${item.game.coverImageUrl}" th:alt="${item.game.title}" class="h-16 w-24 rounded object-cover">
          <div>
            <p class="font-medium text-white" th:text="${item.game.title}">Jeu</p>
            <p class="text-sm text-muted" th:text="${item.quantity} + ' × ' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)} + ' €'">qty</p>
            <p th:if="${item.licenseKey != null}" class="mt-1 font-mono text-xs text-brand-cyan-light" th:text="${item.licenseKey.keyValue}">KEY</p>
          </div>
        </li>
      </ul>
      <dl class="mt-6 border-t border-border pt-4 space-y-2 text-sm">
        <div class="flex justify-between"><dt class="text-muted">Total</dt><dd class="font-semibold text-white" th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)} + ' €'">0 €</dd></div>
      </dl>
    </section>
  </main>
  <div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
