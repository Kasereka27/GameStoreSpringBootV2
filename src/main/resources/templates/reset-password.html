<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Réinitialisation — GameStore Platform', 'Choisissez un nouveau mot de passe pour votre compte GameStore.')}">
  <title>Réinitialisation — GameStore Platform</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-bg-dark text-text antialiased min-h-screen flex flex-col">

  <div th:replace="~{_layout :: auth-background}"></div>
  <header th:replace="~{_layout :: auth-header}"></header>

  <main class="relative flex flex-1 items-center justify-center px-4 py-10 sm:py-14">
    <div class="w-full max-w-md">
      <div class="text-center">
        <h1 class="text-2xl font-bold text-white sm:text-3xl">Nouveau mot de passe</h1>
        <p class="mt-2 text-sm text-muted">Choisissez un mot de passe sécurisé pour votre compte.</p>
      </div>

      <form th:action="@{/reinitialisation-mot-de-passe}" th:object="${resetPasswordForm}" method="post"
            class="mt-8 rounded-2xl border border-border bg-bg-card/80 p-6 shadow-xl backdrop-blur-sm sm:p-8 card-glow">

        <input type="hidden" th:field="*{token}">

        <div th:if="${#fields.hasGlobalErrors()}" class="mb-4 rounded-lg border border-error/30 bg-error/10 px-4 py-3 text-sm text-error">
          <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-muted">Nouveau mot de passe</label>
          <input type="password" id="password" th:field="*{password}" required minlength="8"
                 class="mt-1.5 w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 text-sm text-white focus:border-brand-purple focus:outline-none">
          <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="mt-1 text-xs text-error"></p>
        </div>

        <div class="mt-4">
          <label for="confirmPassword" class="block text-sm font-medium text-muted">Confirmer</label>
          <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required
                 class="mt-1.5 w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 text-sm text-white focus:border-brand-purple focus:outline-none">
        </div>

        <button type="submit" class="mt-6 w-full rounded-lg bg-gradient-to-r from-brand-purple to-brand-purple-light py-3 text-sm font-semibold text-white hover:opacity-90">
          Enregistrer le mot de passe
        </button>
      </form>
    </div>
  </main>

  <footer th:replace="~{_layout :: auth-footer}"></footer>
  <div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
