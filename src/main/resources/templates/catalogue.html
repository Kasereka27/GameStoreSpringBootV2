<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Catalogue — GameStore Platform', 'Parcourez le catalogue GameStore — des milliers de clés de jeux PC, PS5, Xbox et Nintendo.')}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Parcourez le catalogue GameStore — des milliers de clés de jeux PC, PS5, Xbox et Nintendo.">
  <title>Catalogue — GameStore Platform</title><!-- th:text="'Catalogue — GameStore Platform'" -->

  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-gaming-bg text-gaming-text antialiased min-h-screen flex flex-col">

    <header th:replace="~{_layout :: navbar}"></header>

  <main class="flex-1">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">

      <nav aria-label="Fil d'Ariane" class="mb-6">
        <ol class="flex flex-wrap items-center gap-2 text-sm text-gaming-muted">
          <li><a href="index.html" th:href="@{/}" class="transition hover:text-gaming-cyan-light">Accueil</a></li>
          <li aria-hidden="true">/</li>
          <li><span class="text-white" aria-current="page">Catalogue</span></li>
        </ol>
      </nav>

      <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-3xl font-bold text-white sm:text-4xl" th:text="${promoOnly} ? 'Promotions' : 'Catalogue'">Catalogue</h1>
          <p class="mt-2 text-gaming-muted"><span th:text="${totalResults}">0</span> jeux trouvés</p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <button type="button" data-filter-open class="inline-flex items-center gap-2 rounded-lg border border-gaming-border bg-gaming-surface px-4 py-2 text-sm font-medium text-white transition hover:bg-gaming-surface-hover lg:hidden">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
            Filtres
          </button>
          <label for="sort" class="sr-only">Trier par</label>
          <select id="sort" name="sort" data-sort-select
                  th:attr="data-catalogue-path=${cataloguePath}"
                  class="rounded-lg border border-gaming-border bg-gaming-surface px-4 py-2 text-sm text-white focus:border-gaming-purple focus:outline-none">
            <option value="relevance" th:selected="${currentSort == 'relevance'}">Pertinence</option>
            <option value="price-asc" th:selected="${currentSort == 'price-asc'}">Prix ↑</option>
            <option value="price-desc" th:selected="${currentSort == 'price-desc'}">Prix ↓</option>
            <option value="rating" th:selected="${currentSort == 'rating'}">Notes</option>
            <option value="newest" th:selected="${currentSort == 'newest'}">Nouveautés</option>
          </select>
          <div class="flex rounded-lg border border-gaming-border bg-gaming-surface p-1" role="group" aria-label="Mode d'affichage">
            <button type="button" data-view-grid class="rounded-md bg-brand-purple px-3 py-1.5 text-white transition hover:text-white" aria-label="Vue grille" aria-pressed="true">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
            </button>
            <button type="button" data-view-list class="rounded-md px-3 py-1.5 text-gaming-muted transition hover:text-white" aria-label="Vue liste" aria-pressed="false">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-8 lg:flex-row">

        <aside class="hidden w-72 shrink-0 lg:block" aria-label="Filtres de recherche">
          <div class="sticky top-24 rounded-xl border border-gaming-border bg-gaming-surface p-5">
            <div th:replace="~{fragments/filters :: filter-form(cataloguePath=${cataloguePath}, filters=${filters}, currentSort=${currentSort}, genres=${genres}, platforms=${platforms}, mobileId='')}"></div>
          </div>
        </aside>

        <!-- Overlay filtres mobile -->
        <div data-filter-overlay class="fixed inset-0 z-50 hidden items-start justify-end bg-black/60 lg:hidden" aria-hidden="true">
          <div class="h-full w-full max-w-sm overflow-y-auto border-l border-gaming-border bg-gaming-surface p-5 shadow-xl">
            <div class="mb-4 flex items-center justify-between">
              <h2 class="text-lg font-semibold text-white">Filtres</h2>
              <button type="button" data-filter-close class="rounded-lg p-2 text-gaming-muted hover:bg-gaming-surface-hover hover:text-white" aria-label="Fermer les filtres">&times;</button>
            </div>
            <div th:replace="~{fragments/filters :: filter-form(cataloguePath=${cataloguePath}, filters=${filters}, currentSort=${currentSort}, genres=${genres}, platforms=${platforms}, mobileId='mobile')}"></div>
          </div>
        </div>

        <div class="min-w-0 flex-1" data-catalog-wrapper>
          <p th:if="${#lists.isEmpty(games)}" class="rounded-xl border border-gaming-border bg-gaming-surface p-8 text-center text-gaming-muted">Aucun jeu trouvé pour ces critères.</p>
          <ul th:unless="${#lists.isEmpty(games)}" data-catalog-grid class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4">
            <th:block th:each="game : ${games}">
              <li th:replace="~{fragments/game-card :: catalogueCard(game=${game})}"></li>
            </th:block>
          </ul>

          <div class="mt-10 flex flex-col items-center gap-4 sm:flex-row sm:justify-between">
            <p class="text-sm text-gaming-muted">
              Affichage <span th:text="${page.from}">1</span>-<span th:text="${page.to}">12</span> sur <span th:text="${page.totalResults}">0</span> résultats
            </p>
            <div th:replace="~{fragments/pagination :: pagination(page=${page}, filters=${filters}, currentSort=${currentSort}, cataloguePath=${cataloguePath})}"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

    <footer th:replace="~{_layout :: footer}"></footer>

    <div th:replace="~{_layout :: toasts}"></div>

  <div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
