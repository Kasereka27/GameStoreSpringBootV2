<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Jeux</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <p th:if="${message}" class="success" th:text="${message}"></p>
    <p th:if="${error}" class="error" th:text="${error}"></p>
    <h2>Jeux</h2>
    <p><a th:href="@{/games/new}">+ Nouveau jeu</a></p>
    <table>
        <thead>
        <tr>
            <th>Titre</th>
            <th>Prix</th>
            <th>Genres</th>
            <th>Tags</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="game : ${games}">
            <td th:text="${game.title}">Titre</td>
            <td th:text="${game.price} + ' EUR'">0</td>
            <td th:text="${#strings.listJoin(game.genreLabels, ', ')}">-</td>
            <td th:text="${#strings.listJoin(game.tagLabels, ', ')}">-</td>
            <td>
                <a th:href="@{/games/{id}/edit(id=${game.id})}">Modifier</a>
                <form th:action="@{/games/{id}/delete(id=${game.id})}" method="post" style="display:inline">
                    <button type="submit">Supprimer</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
