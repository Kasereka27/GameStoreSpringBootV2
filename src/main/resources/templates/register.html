<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Inscription — GameStore Platform', 'Créez votre compte GameStore Platform et accédez à vos clés de jeux.')}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Créez votre compte GameStore Platform et accédez à vos clés de jeux.">
  <title>Inscription — GameStore Platform</title>

  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-bg-dark text-text antialiased min-h-screen flex flex-col">

  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden" aria-hidden="true">
    <div class="absolute -left-1/4 top-0 h-[600px] w-[600px] rounded-full bg-brand-purple/20 blur-[120px]"></div>
    <div class="absolute -right-1/4 bottom-0 h-[500px] w-[500px] rounded-full bg-brand-cyan/15 blur-[100px]"></div>
    <div class="absolute inset-0 bg-gradient-to-br from-bg-dark via-bg-dark/95 to-[#12121f]"></div>
  </div>

    <header th:replace="~{_layout :: auth-header}"></header>

  <main class="relative flex flex-1 items-center justify-center px-4 py-10 sm:py-14">
    <div class="w-full max-w-md">

      <div class="text-center">
        <h1 class="text-2xl font-bold text-white sm:text-3xl">Rejoignez GameStore</h1>
        <p class="mt-2 text-sm text-muted">Créez un compte gratuit pour gérer vos achats et clés.</p>
      </div>

      <form class="mt-8 rounded-2xl border border-border bg-bg-card/80 p-6 shadow-xl backdrop-blur-sm sm:p-8 card-glow"
            th:action="@{/register}" th:object="${registerForm}" method="post">

        <ul th:if="${#fields.hasErrors('*')}" class="mb-4 space-y-1 rounded-lg border border-error/30 bg-error/10 px-4 py-3 text-sm text-error">
          <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
        </ul>

        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label for="firstName" class="block text-sm font-medium text-muted">Prénom</label>
            <input type="text" id="firstName" th:field="*{firstName}" required autocomplete="given-name"
                   class="mt-1.5 w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 text-sm text-white placeholder-muted focus:border-brand-purple focus:outline-none focus:ring-1 focus:ring-brand-purple"
                   placeholder="Jean">
            <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="mt-1 text-xs text-error"></p>
          </div>
          <div>
            <label for="lastName" class="block text-sm font-medium text-muted">Nom</label>
            <input type="text" id="lastName" th:field="*{lastName}" required autocomplete="family-name"
                   class="mt-1.5 w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 text-sm text-white placeholder-muted focus:border-brand-purple focus:outline-none focus:ring-1 focus:ring-brand-purple"
                   placeholder="Dupont">
            <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="mt-1 text-xs text-error"></p>
          </div>
        </div>

        <div class="mt-4">
          <label for="email" class="block text-sm font-medium text-muted">Adresse e-mail</label>
          <input type="email" id="email" th:field="*{email}" required autocomplete="email"
                 class="mt-1.5 w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 text-sm text-white placeholder-muted focus:border-brand-purple focus:outline-none focus:ring-1 focus:ring-brand-purple"
                 placeholder="votre@email.com">
          <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="mt-1 text-xs text-error"></p>
        </div>

        <div class="mt-4">
          <label for="password" class="block text-sm font-medium text-muted">Mot de passe</label>
          <input type="password" id="password" th:field="*{password}" required autocomplete="new-password" minlength="8"
                 class="mt-1.5 w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 text-sm text-white placeholder-muted focus:border-brand-purple focus:outline-none focus:ring-1 focus:ring-brand-purple"
                 placeholder="8 caractères minimum">
          <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="mt-1 text-xs text-error"></p>
        </div>

        <div class="mt-4">
          <label for="confirmPassword" class="block text-sm font-medium text-muted">Confirmer le mot de passe</label>
          <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required autocomplete="new-password"
                 class="mt-1.5 w-full rounded-lg border border-border bg-bg-dark px-4 py-2.5 text-sm text-white placeholder-muted focus:border-brand-purple focus:outline-none focus:ring-1 focus:ring-brand-purple"
                 placeholder="Répétez le mot de passe">
        </div>

        <label class="mt-4 flex cursor-pointer items-start gap-2">
          <input type="checkbox" th:field="*{acceptTerms}" class="mt-1 h-4 w-4 rounded border-border bg-bg-dark text-brand-purple focus:ring-brand-purple">
          <span class="text-sm text-muted">J'accepte les conditions d'utilisation et la politique de confidentialité.</span>
        </label>

        <button type="submit"
                class="mt-6 flex w-full items-center justify-center gap-2 rounded-lg bg-gradient-to-r from-brand-purple to-brand-purple-light py-3 text-sm font-semibold text-white transition hover:opacity-90">
          Créer mon compte
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-muted">
        Déjà inscrit ?
        <a th:href="@{/login}" class="font-medium text-brand-cyan-light transition hover:underline">Se connecter</a>
      </p>
    </div>
  </main>

  <footer th:replace="~{_layout :: auth-footer}"></footer>

  <div th:replace="~{_layout :: scripts}"></div>
</body>
</html>
