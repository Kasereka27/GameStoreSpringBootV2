services:
  mysql:
    image: mysql:8.4
    container_name: gamestore-mysql
    environment:
      MYSQL_DATABASE: gamestore
      MYSQL_USER: gamestore
      MYSQL_PASSWORD: gamestore
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - gamestore_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ugamestore", "-pgamestore"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: gamestore-adminer
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  gamestore_mysql_data:
